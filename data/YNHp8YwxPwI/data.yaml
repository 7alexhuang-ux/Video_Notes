  title: 台灣超高齡社會與長照服務挑戰
  summary: 台灣65歲以上人口持續上升，年增約44.6萬，已接近超高齡社會門檻。高齡化使得工作人口平均需照顧一名長者，造成勞動力短缺與經濟發展壓力。照顧者的身心健康亦受到威脅，長期以來形成國家安全風險。為應對人口結構變化，政府投入長照基金，預計到2024年將達約8.79億元，並推動日間照顧中心與分級服務（ABC3級）以提升長照覆蓋與品質。
