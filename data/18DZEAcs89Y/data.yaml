  transcript: 透視圖
  note: ''
  title: 透視圖概念與應用
  summary: "- 透視圖定義\n  - 透視圖是用來表現三維物體在二維平面上的投影\n  - 透過消失點將遠近關係呈現\n- 主要類型\n  - 一點透視：單一消失點，適用於正面或背面視角\n\
    \  - 二點透視：兩個消失點，常見於角度視角\n  - 三點透視：三個消失點，適用於俯視或仰視\n- 重要構成要素\n  - 地平線（horizon line）決定視角高度\n\
    \  - 消失點（vanishing point）決定遠距離收斂方向\n  - 參考線（projecting lines）連結實際物體與消失點\n- 應用技巧\n\
    \  - 使用格線或軟體工具快速定位消失點\n  - 透視比例調整以保持比例一致"
